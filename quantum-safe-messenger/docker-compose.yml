version: '3.9'

services:

  # ── NGINX — Single public entry point ──────────────────────────
  nginx:
    image: nginx:alpine
    container_name: qsm_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - qsm_network

  # ── FRONTEND — Next.js 15 ──────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: qsm_frontend
    env_file:
      - .env.local
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:3001}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - qsm_network

  # ── BACKEND — Node.js + Express + WebSocket ───────────────────
  backend:
    build:
      context: ./server
      dockerfile: ../docker/Dockerfile.backend
    container_name: qsm_backend
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD}@postgres:5432/quantum_safe_messenger
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - qsm_network

  # ── POSTGRESQL 14 ──────────────────────────────────────────────
  postgres:
    image: postgres:14-alpine
    container_name: qsm_postgres
    ports:
      - "5432:5432"       # exposed for local dev (Node server on host)
    environment:
      POSTGRES_DB: quantum_safe_messenger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quantum_safe_messenger"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - qsm_network

  # ── REDIS 7 ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: qsm_redis
    ports:
      - "6379:6379"       # exposed for local dev (Node server on host)
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme_in_production}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_in_production}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - qsm_network

volumes:
  postgres_data:
    name: qsm_postgres_data

networks:
  qsm_network:
    name: qsm_network
    driver: bridge